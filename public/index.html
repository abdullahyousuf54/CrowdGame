<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdPlay | Interactive Event Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #080415;
      --color-cyan: #00f3ff;
      --color-pink: #ff007f;
      --font-main: 'Outfit', sans-serif;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: var(--bg-dark);
      color: #fff;
      font-family: var(--font-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .crt {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
      background-size: 100% 4px;
      z-index: 100;
      pointer-events: none;
    }
    .glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255, 0, 127, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(0, 243, 255, 0.1) 0%, transparent 40%);
      z-index: -1;
    }
    .launcher {
      text-align: center;
      background: rgba(15, 9, 38, 0.7);
      backdrop-filter: blur(10px);
      padding: 50px;
      border-radius: 20px;
      border: 1.5px solid rgba(255, 0, 127, 0.25);
      box-shadow: 0 10px 45px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 90%;
    }
    h1 {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 5px;
      color: var(--color-cyan);
      margin-bottom: 10px;
      text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
    }
    .pink {
      color: var(--color-pink);
      text-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
    }
    p {
      color: #94a3b8;
      font-size: 16px;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .btn {
      display: block;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      text-align: center;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .btn-pink {
      background: var(--color-pink);
      color: #000;
    }
    .btn-pink:hover {
      background: #ff3399;
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
    }
    .btn-cyan {
      background: transparent;
      color: var(--color-cyan);
      border: 1.5px solid var(--color-cyan);
    }
    .btn-cyan:hover {
      background: var(--color-cyan);
      color: #000;
      box-shadow: 0 0 15px var(--color-cyan);
    }
  </style>
</head>
<body>
  <div class="crt"></div>
  <div class="glow"></div>

  <div class="launcher">
    <h1>CROWD<span class="pink">PLAY</span></h1>
    <p>Interactive social games and collaborative puzzle modules designed for events, malls, and conferences.</p>
    
    <div class="btn-group">
      <a href="/admin" class="btn btn-pink">Enter Admin Panel</a>
      <a href="/screen/DEMO" class="btn btn-cyan">Open Big Screen Display</a>
    </div>
  </div>
</body>
</html>
